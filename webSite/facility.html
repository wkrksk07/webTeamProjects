<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설 안내 - 홍익대학교 세종캠퍼스</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .facility-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 2.5rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            flex: 1; /* 컨텐츠에 따라 늘어나도록 설정 */
            height: auto; /* 고정 높이 제거 */
            min-height: 600px;
        }
        .header-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #005bac;
            padding-bottom: 1.5rem;
            margin-bottom: 4rem;
        }
        .header-group h2 {
            margin: 0;
            font-size: 1.6rem;
            color: #2c3e50;
        }
        #refresh-btn {
            padding: 0.8rem 1.5rem;
            background: #005bac;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #refresh-btn:hover { 
            background: #004482; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,91,172,0.3);
        }
        .diet-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            height: auto;
        }
        @media (max-width: 768px) {
            .diet-grid {
                grid-template-columns: 1fr;
            }
            .header-group {
                flex-direction: column;
                gap: 1.5rem;
                text-align: center;
            }
        }
        .diet-card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 2rem;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.3s;
            height: fit-content; /* 컨텐츠에 맞게 높이 조절 */
        }
        .diet-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.05); }
        .diet-date {
            font-size: 1.2rem;
            font-weight: 700;
            color: #c8001e;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px dashed #ddd;
        }
        .meal-section {
            margin-bottom: 1.5rem;
        }
        .meal-type {
            display: inline-block;
            padding: 4px 12px;
            background: #f8f9fa;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }
        .menu-list {
            line-height: 1.8;
            color: #444;
            font-size: 1rem;
            white-space: pre-wrap;
            padding-left: 0.5rem;
        }
        .loading { text-align: center; color: #888; padding: 4rem; grid-column: 1 / -1; }
        
        .footer {
            background-color: #2c3e50;
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <a href="/index.html" style="text-decoration: none;"><h1>세종캠퍼스 3D 맵 서비스</h1></a>
        </div>
        <div class="nav-center">
            <img src="/Img/hongik-logo-on.svg" alt="홍익대학교 로고" class="school-logo">
        </div>
        <div class="nav-right">
            <nav>
                <ul>
                    <li><a href="/index.html">홈</a></li>
                    <li><a href="/facility.html" class="active">시설 안내</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="facility-container">
        <div class="header-group">
            <h2>🍴 학생 식당 식단 정보</h2>
            <button id="refresh-btn">🔄 정보 업데이트</button>
        </div>
        
        <div id="diet-content" class="diet-grid">
            <p class="loading">식단 정보를 불러오고 있습니다...</p>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 홍익대학교 세종캠퍼스 3D 맵 프로젝트 팀. All rights reserved.</p>
    </footer>

    <script type="module">
        const refreshBtn = document.querySelector('#refresh-btn');
        const content = document.querySelector('#diet-content');

        async function fetchDietData() {
            content.innerHTML = '<p class="loading">학교 서버에서 최신 식단을 가져오는 중입니다...</p>';
            
            setTimeout(() => {
                const mockData = [
                    {
                        date: "5월 12일 (화) - 오늘",
                        meals: [
                            { type: "점심", menu: "쯔유닭조림\n차돌박이된장찌개\n파프리카미트볼조림\n호박가지볶음\n잡곡밥\n배추김치\n(퓨전식 6,500원)쇠고기김치볶음밥*계란후라이&돈야채까스\n(양식 6,000원)王돈까스*매콤한그래비소스" },
                            { type: "점심/저녁", menu: "컵주먹밥" },
                            { type: "저녁", menu: "짜파게티\n김칫국\n주먹밥\n수제치킨강정\n단무지\n파김치" }
                        ]
                    },
                    {
                        date: "5월 13일 (수) - 내일",
                        meals: [
                            { type: "점심", menu: "제육볶음\n얼큰어묵국\n두부양념조림\n콩나물무침\n흑미밥\n배추김치\n(양식) 왕돈까스" },
                            { type: "점심/저녁", menu: "컵주먹밥" },
                            { type: "저녁", menu: "비빔밥\n약고추장\n계란후라이\n콩가루배추국\n요구르트" }
                        ]
                    }
                ];
                renderDiet(mockData);
            }, 800);
        }

        window.addEventListener('DOMContentLoaded', fetchDietData);
        refreshBtn.addEventListener('click', fetchDietData);

        function renderDiet(data) {
            content.innerHTML = '';
            data.forEach(day => {
                const card = document.createElement('div');
                card.className = 'diet-card';
                
                let mealsHtml = day.meals.map(m => `
                    <div class="meal-section">
                        <span class="meal-type">${m.type}</span>
                        <div class="menu-list">${m.menu}</div>
                    </div>
                `).join('');
                
                card.innerHTML = `
                    <div class="diet-date">${day.date}</div>
                    ${mealsHtml}
                `;
                content.appendChild(card);
            });
        }
    </script>
</body>
</html>
