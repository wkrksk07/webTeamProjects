<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>홍익대학교 세종캠퍼스 3D 맵</title>
  </head>
  <body>
    <header class="navbar">
      <div class="nav-left">
        <h1>세종캠퍼스 3D 맵 서비스</h1>
      </div>
      <div class="nav-center">
        <img src="/Img/hongik-logo-on.svg" alt="홍익대학교 로고" class="school-logo">
      </div>
      <div class="nav-right">
        <nav>
          <ul>
            <li><a href="/index.html">홈</a></li>
            <li><a href="/facility.html">시설 안내</a></li>
            <li><a href="#">공지사항</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="container">
      <!-- 좌측 강의실 목록 -->
      <aside class="sidebar">
        <div class="floor-selector">
          <button class="floor-btn active" data-floor="all">전체보기</button>
          <button class="floor-btn" data-floor="2">2F</button>
          <button class="floor-btn" data-floor="3">3F</button>
          <button class="floor-btn" data-floor="4">4F</button>
        </div>
        <h2 id="current-floor-title">A동 강의실 (전체)</h2>
        <ul id="room-list">
          <!-- 스크립트에서 동적으로 생성 예정 -->
        </ul>
      </aside>

      <!-- 중앙 3D 뷰어 -->
      <div id="app"></div>
      
      <!-- 우측 컨트롤 및 정보 패널 -->
      <aside class="control-panel">
        <section class="info-box shadow">
          <h2>건물 정보</h2>
          <p id="room-name">강의실을 선택하세요.</p>
          <div class="details">
            <p><strong>위치:</strong> 본관 A동</p>
            <p><strong>상태:</strong> 이용 가능</p>
          </div>
        </section>

        <section class="coord-collector shadow">
          <div class="collector-header">
            <h3>📍 좌표 수집 도구</h3>
            <label class="switch">
              <input type="checkbox" id="collect-mode-toggle">
              <span class="slider round"></span>
            </label>
          </div>
          <p class="help-text">모드 활성화 후 모델을 클릭하세요.</p>
          <div id="coord-logs" class="logs">
            <!-- 로그가 여기에 쌓임 -->
          </div>
          <button id="clear-logs">로그 초기화</button>
        </section>
      </aside>
    </main>

    <footer class="footer">
      <p>&copy; 2026 학교 3D 맵 프로젝트 팀. All rights reserved.</p>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
